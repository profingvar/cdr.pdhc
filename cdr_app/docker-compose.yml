services:
  db:
    image: postgres:16
    container_name: cdr_pdhc_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cdr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cdr_pass}
      POSTGRES_DB: ${POSTGRES_DB:-cdr_db}
    ports:
      - "127.0.0.1:9047:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cdr_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cdr_pdhc_app
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cdr_user}:${POSTGRES_PASSWORD:-cdr_pass}@db:5432/${POSTGRES_DB:-cdr_db}
    ports:
      - "9046:9046"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
